      "Futur simple":["je boirai","tu boiras","il boira","nous boirons","vous boirez","ils boiront"]
    },
    conditionnel:{"Présent":["je boirais","tu boirais","il boirait","nous boirions","vous boiriez","ils boiraient"]},
    subjonctif:{"Présent":["que je boive","que tu boives","qu'il boive","que nous buvions","que vous buviez","qu'ils boivent"]}
  },
  "croire":{groupe:3, participe:"cru", aux:"avoir",
    indicatif:{
      "Présent":["je crois","tu crois","il croit","nous croyons","vous croyez","ils croient"],
      "Imparfait":["je croyais","tu croyais","il croyait","nous croyions","vous croyiez","ils croyaient"],
      "Passé simple":["je crus","tu crus","il crut","nous crûmes","vous crûtes","ils crurent"],
      "Futur simple":["je croirai","tu croiras","il croira","nous croirons","vous croirez","ils croiront"]
    },
    conditionnel:{"Présent":["je croirais","tu croirais","il croirait","nous croirions","vous croiriez","ils croiraient"]},
    subjonctif:{"Présent":["que je croie","que tu croies","qu'il croie","que nous croyions","que vous croyiez","qu'ils croient"]}
  }
};

/* Retourne true si verbe est dans la liste d'irreguliers */
function estIrregulier(v){
  return irreguliers.hasOwnProperty(v);
}

/* Détection de groupe simple (approximation correcte pour la plupart) */
function detecteGroupe(verbe){
  if(verbe === "aller") return 3;
  if(verbe.endsWith("er")) return 1;
  if(verbe.endsWith("ir") && !verbe.endsWith("oir")) {
    // attention : certains -ir sont 3e groupe; nous garderons comme 2e sauf s'il est dans irreguliers
    return 2;
  }
  return 3;
}

/* Conjugaison régulière 1er groupe (terminaisons) */
const term1 = {
  "Présent":["e","es","e","ons","ez","ent"],
  "Imparfait":["ais","ais","ait","ions","iez","aient"],
  "Passé simple":["ai","as","a","âmes","âtes","èrent"], // approximatif (parler -> parlai, parlas, parla, parlâmes...)
  "Futur simple":["erai","eras","era","erons","erez","eront"]
};

/* Conjugaison régulière 2e groupe (-ir -> -iss- pour présent/imparfait etc) */
const term2 = {
  "Présent":["is","is","it","issons","issez","issent"],
  "Imparfait":["issais","issais","issait","issions","issiez","issaient"],
  "Passé simple":["is","is","it","îmes","îtes","irent"],
  "Futur simple":["irai","iras","ira","irons","irez","iront"]
};

/* Construire participe passé régulier */
function participePasseRegulier(verbe, groupe){
  if(groupe === 1) return verbe.slice(0,-2) + "é"; // parler -> parlé
  if(groupe === 2) return verbe.slice(0,-2) + "i"; // finir -> fini
  // 3e groupe par défaut approximatif: remove -re/-ir -> u
  if(verbe.endsWith("re")) return verbe.slice(0,-2) + "u";
  if(verbe.endsWith("oir")) return verbe.slice(0,-3) + "u";
  if(verbe.endsWith("ir")) return verbe.slice(0,-2) + "i";
  return verbe + "é";
}

/* Construire conjugaisons régulières (indicatif simple) */
function conjugaisonsRegulier(verbe, groupe){
  const rad = (groupe===1 || groupe===2) ? verbe.slice(0,-2) : verbe.slice(0,-2);
  let res = {};
  if(groupe===1){
    for(let temps in term1){
      res[temps] = term1[temps].map((suf, i) => {
        let forme = pronoms[i] + " " + (i===0 && startsWithVowelOrH(rad+"e") ? apostrophe(pronoms[i]) : "");
        // manage elision "je" -> "j'"
        const base = (temps==="Futur simple" || temps==="Passé simple") && ["ai","as","a","âmes","âtes","èrent"].includes(suf) ? rad + suf.replace(/^e/,'e') : rad + (suf);
        // For present: add e/es/e...
        return cleanEspaces((i===0 && startsWithVowelOrH(rad + (suf.startsWith("e")? "e":""))? apostrophe(pronoms[i]) : pronoms[i]) + " " + rad + suf);
      });
    }
  } else if(groupe===2){
    for(let temps in term2){
      res[temps] = term2[temps].map((suf,i)=> cleanEspaces((i===0 && startsWithVowelOrH(rad+"i")? apostrophe(pronoms[i]) : pronoms[i]) + " " + rad + suf));
    }
  } else {
    // 3e groupe régulier approximatif: fallback to participe + present uses -s/-s/-t etc — we'll produce simple fallback
    res["Présent"] = ["je " + verbe, "tu " + verbe, "il " + verbe, "nous " + verbe, "vous " + verbe, "ils " + verbe];
    res["Imparfait"] = pronoms.map((p,i)=> p + " " + verbe + "ais");
    res["Passé simple"] = pronoms.map((p,i)=> p + " " + verbe + "u");
    res["Futur simple"] = pronoms.map((p,i)=> p + " " + verbe + "ra");
  }
  return res;
}

/* Helpers */
function apostrophe(pron){ return "j'"; }
function startsWithVowelOrH(str){ return /^[aeiouhàâäéèêëîïôöùûüy]/i.test(str); }
function cleanEspaces(s){ return s.replace(/\s+/g,' ').replace("je je","je").trim(); }
function coloriseConjugaison(texte){
  const parts = texte.split(" ");
  if(parts.length < 2) return texte;

  const sujet = parts[0];       // je, tu, il...
  const mot = parts.slice(1).join(" ");

  // on essaie de séparer verbe + terminaison (approx simple)
  const match = mot.match(/(.+?)(e|es|e|ons|ez|ent|is|it|issons|issez|issent|ai|as|a|ons|ez|ont|ais|ait|ions|iez|aient|rai|ras|ra|rons|rez|ront)$/);

  if(!match){
    return `<span class="verbe">${sujet} ${mot}</span>`;
  }

  const base = match[1];
  const term = match[2];

  return `${sujet} <span class="verbe">${base}</span><span class="term">${term}</span>`;
}

/* Construire temps composés à partir d'un auxiliaire et du participe (aux conjugué à temps simple) */
function compose(tempsAux, tenseAuxForms, participe){
  // tenseAuxForms : tableau 6 formes de l'auxiliaire (ex: aux['avoir']['Présent'])
  return tenseAuxForms.map((auxForm, i) => {
    // si auxiliaire est "j'ai", ça contient déjà pronom; on ajoute le participe
    return auxForm + " " + participe;
  });
}

/* Construire plus-que-parfait / passé antérieur / futur antérieur selon auxiliaire */
function construitCompose(verbeData, verbe, tempsComposeName){
  // tempsComposeName est une des : Passé composé, Plus-que-parfait, Passé antérieur, Futur antérieur
  // Map temps composé -> auxiliaire tense to use
  // Passé composé : auxiliaire au présent
  // Plus-que-parfait : auxiliaire à l'imparfait
  // Passé antérieur : auxiliaire au passé simple
  // Futur antérieur : auxiliaire au futur simple
  const mapTemps = {
    "Passé composé": ["Présent","Passé composé"],
    "Plus-que-parfait": ["Imparfait","Plus-que-parfait"],
    "Passé antérieur": ["Passé simple","Passé antérieur"],
    "Futur antérieur": ["Futur simple","Futur antérieur"]
  };
  const mapping = mapTemps[tempsComposeName];
  if(!mapping) return pronoms.map((p)=> p + " " + verbe + " (N/A)");
  const tenseForAux = mapping[0]; // e.g. "Présent"
  const auxName = (verbeData && verbeData.aux) ? verbeData.aux : "avoir";
  const auxForms = aux[auxName] && aux[auxName][tenseForAux] ? aux[auxName][tenseForAux] : aux["avoir"][tenseForAux];
  const participe = verbeData && verbeData.participe ? verbeData.participe : participePasseRegulier(verbe, detecteGroupe(verbe));
  return compose(auxName, auxForms, participe);
}

/* Construire les temps composés listés (on fournit Passé composé, Plus-que-parfait, Passé antérieur, Futur antérieur) */
function tousTempsComposes(verbeData, verbe){
  return {
    "Passé composé": construitCompose(verbeData,verbe,"Passé composé"),
    "Plus-que-parfait": construitCompose(verbeData,verbe,"Plus-que-parfait"),
    "Passé antérieur": construitCompose(verbeData,verbe,"Passé antérieur"),
    "Futur antérieur": construitCompose(verbeData,verbe,"Futur antérieur")
  };
}

/* Construire conditionnel présent réguliers (pour 1er et 2e groupe on base sur futur radical + terminaisons de conditionnel) */
const condTerm = ["ais","ais","ait","ions","iez","aient"];
function conditionnelPresentRegulier(verbe, groupe){
  let radicalFutur;
  if(groupe===1) radicalFutur = verbe; // parler -> parler-
  else if(groupe===2) radicalFutur = verbe; // finir -> finir-
  else radicalFutur = verbe; // fallback
  return pronoms.map((p,i)=> cleanEspaces((i===0 && startsWithVowelOrH(radicalFutur)? apostrophe(p) : p) + " " + radicalFutur + condTerm[i]));
}

/* Conditionnel passé = auxiliaire au conditionnel présent + participe */
function conditionnelPasse(verbeData, verbe){
  const auxName = verbeData && verbeData.aux ? verbeData.aux : "avoir";
  // construire conditionnel présent de l'auxiliaire (en utilisant nos données limitées)
  const condAux = auxName==="être" ? [
    "je serais","tu serais","il serait","nous serions","vous seriez","ils seraient"
  ] : [
    "j'aurais","tu aurais","il aurait","nous aurions","vous auriez","ils auraient"
  ];
  const participe = verbeData && verbeData.participe ? verbeData.participe : participePasseRegulier(verbe, detecteGroupe(verbe));
  return condAux.map((a)=> a + " " + participe);
}

/* Subjonctif présent régulier (approx) -> pour 1er et 2e groupe */
function subjonctifPresentRegulier(verbe, groupe){
  const rad = (groupe===1 || groupe===2) ? verbe.slice(0,-2) : verbe.slice(0,-2);
  // terminaisons usuelles du subjonctif présent : e,es,e,ions,iez,ent
  const s = ["e","es","e","ions","iez","ent"];
  return s.map((suf,i)=> cleanEspaces((i===0 && startsWithVowelOrH(rad+suf)? apostrophe(pronoms[i]) : pronoms[i]) + " " + rad + suf));
}

/* Subjonctif passé = subjonctif présent de l'auxiliaire + participe */
function subjonctifPasse(verbeData, verbe){
  // subjonctif présent auxiliaire forms minimal
  const auxName = verbeData && verbeData.aux ? verbeData.aux : "avoir";
  const subAux = auxName==="être" ? ["que je sois","que tu sois","qu'il soit","que nous soyons","que vous soyez","qu'ils soient"]
                                  : ["que j'aie","que tu aies","qu'il ait","que nous ayons","que vous ayez","qu'ils aient"];
  const participe = verbeData && verbeData.participe ? verbeData.participe : participePasseRegulier(verbe, detecteGroupe(verbe));
  return subAux.map(a => a + " " + participe);
}

/* ---------- Générateur principal ---------- */

function conjuguer(){
  const raw = document.getElementById("verbeInput").value.trim().toLowerCase();

  if(!raw){
    document.getElementById("result").innerHTML = "<p>Veuillez entrer un verbe.</p>";
    return;
  }

  const modeReq = document.getElementById("modeSelection").value;

  /* Normalisation (IMPORTANT 🔥) */
  const verbe = raw
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, ""); // enlève accents

  /* ===== FILTRAGE STRICT ===== */
  if(!listeVerbes.includes(verbe)){
    document.getElementById("result").innerHTML =
      `<p style="color:red;font-weight:bold">❌ Verbe non autorisé !</p>
       <p>Cette plateforme ne conjugue que les verbes définis par l’administrateur.</p>`;
    return;
  }

  const groupe = estIrregulier(verbe)
    ? irreguliers[verbe].groupe
    : detecteGroupe(verbe);

  let html = `<h2>Verbe : <strong>${verbe}</strong> — ${groupe}ᵉ groupe ${estIrregulier(verbe) ? "(irrégulier connu)" : ""}</h2>`;

  /* Construire indicatif (simples) */
  if(modeReq==="auto" || modeReq==="indicatif"){
    html += `<h3>Mode : Indicatif — Temps simples</h3>`;
    // Simples : Présent, Imparfait, Passé simple, Futur simple
    let simples = {};
    if(estIrregulier(verbe)){
      simples = irreguliers[verbe].indicatif;
    } else {
      simples = conjugaisonsRegulier(verbe,groupe);
    }
    ["Présent","Imparfait","Passé simple","Futur simple"].forEach(t=>{
      if(simples[t]){
        html += `<h4>${t}</h4><ul>` + simples[t].map(f => `<li>${coloriseConjugaison(f)}</li>`).join("") + `</ul>`;
      }
    });

    /* Composés de l'indicatif */
    html += `<h3>Mode : Indicatif — Temps composés</h3>`;
    const compos = tousTempsComposes(estIrregulier(verbe)? irreguliers[verbe] : null, verbe);
    ["Passé composé","Plus-que-parfait","Passé antérieur","Futur antérieur"].forEach(t=>{
      html += `<h4>${t}</h4><ul>` + compos[t].map(f => `<li>${f}</li>`).join("") + `</ul>`;
    });
  }

  /* Conditionnel */
  if(modeReq==="auto" || modeReq==="conditionnel"){
    html += `<h3>Mode : Conditionnel</h3>`;
    if(estIrregulier(verbe)){
      // présent conditionnel depuis la base si disponible
      const pres = irreguliers[verbe].conditionnel && irreguliers[verbe].conditionnel["Présent"] ? irreguliers[verbe].conditionnel["Présent"] : conditionnelPresentRegulier(verbe,groupe);
      html += `<h4>Présent</h4><ul>` + pres.map(f => `<li>${f}</li>`).join("") + `</ul>`;
      // passé
      html += `<h4>Passé</h4><ul>` + conditionnelPasse(irreguliers[verbe],verbe).map(f=>`<li>${f}</li>`).join("") + `</ul>`;
    } else {
      html += `<h4>Présent</h4><ul>` + conditionnelPresentRegulier(verbe,groupe).map(f=>`<li>${f}</li>`).join("") + `</ul>`;
      html += `<h4>Passé</h4><ul>` + conditionnelPasse(null,verbe).map(f=>`<li>${f}</li>`).join("") + `</ul>`;
    }
  }

  /* Subjonctif */
  if(modeReq==="auto" || modeReq==="subjonctif"){
    html += `<h3>Mode : Subjonctif</h3>`;
    if(estIrregulier(verbe)){
      const pres = irreguliers[verbe].subjonctif && irreguliers[verbe].subjonctif["Présent"] ? irreguliers[verbe].subjonctif["Présent"] : subjonctifPresentRegulier(verbe,groupe);
      html += `<h4>Présent</h4><ul>` + pres.map(f=>`<li>${f}</li>`).join("") + `</ul>`;
      html += `<h4>Passé</h4><ul>` + subjonctifPasse(irreguliers[verbe],verbe).map(f=>`<li>${f}</li>`).join("") + `</ul>`;
    } else {
      html += `<h4>Présent</h4><ul>` + subjonctifPresentRegulier(verbe,groupe).map(f=>`<li>${f}</li>`).join("") + `</ul>`;
      html += `<h4>Passé</h4><ul>` + subjonctifPasse(null,verbe).map(f=>`<li>${f}</li>`).join("") + `</ul>`;
    }
  }

  document.getElementById("result").innerHTML = html;
}

/* Exemple rapide pour tester */
function exemples(){

  document.getElementById("verbeInput").value = liste[Math.floor(Math.random()*liste.length)];
